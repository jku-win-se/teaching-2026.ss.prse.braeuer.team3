version: '3.8'

services:
  postgres-test:
    image: postgres:16
    container_name: smarthome-db-test
    environment:
      POSTGRES_DB: smarthome_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d smarthome_test"]
      interval: 10s
      timeout: 5s
      retries: 5
