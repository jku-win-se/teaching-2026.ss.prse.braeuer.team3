spring:
  application:
    name: smarthome-orchestrator
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    repair-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-32-chars!!}
