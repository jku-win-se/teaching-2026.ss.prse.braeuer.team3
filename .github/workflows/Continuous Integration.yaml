name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype/smarthome-orchestrator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: prototype/smarthome-orchestrator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile (TypeScript check)
        run: npx tsc --noEmit

      - name: Test & coverage
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: prototype/smarthome-orchestrator/coverage/

      - name: Lint (ESLint)
        run: npx ng lint

      - name: Build (production)
        run: npx ng build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarthome-dist
          path: prototype/smarthome-orchestrator/dist/
