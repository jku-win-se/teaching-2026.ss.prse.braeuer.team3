name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smarthome
          POSTGRES_USER: smarthome_user
          POSTGRES_PASSWORD: smarthome_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: smarthome
      DB_USER: smarthome_user
      DB_PASSWORD: smarthome_ci
      JWT_SECRET: ci_jwt_secret_for_testing_purposes_only_32x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Test & coverage check
        run: mvn verify -q

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/target/surefire-reports/*.xml

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Update README coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('target/site/jacoco/jacoco.csv') != ''
        shell: bash
        run: |
          coverage="$(awk -F, 'NR>1 {miss += $8; cov += $9} END {total = miss + cov; if (total == 0) {print 0} else {printf "%.0f", (cov/total)*100}}' target/site/jacoco/jacoco.csv)"
          color="red"
          if [ "$coverage" -ge 90 ]; then color="brightgreen";
          elif [ "$coverage" -ge 80 ]; then color="green";
          elif [ "$coverage" -ge 70 ]; then color="yellow";
          elif [ "$coverage" -ge 60 ]; then color="orange";
          fi
          badge="[![Coverage](https://img.shields.io/badge/coverage-${coverage}%25-${color})](https://github.com/${{ github.repository }}/actions/workflows/Continuous%20Integration.yaml)"
          if grep -qE '^\[!\[Coverage\]\(' README.md; then
            sed -i -E "s#^\[!\[Coverage\]\(.*#${badge}#g" README.md
          else
            sed -i "3i ${badge}" README.md
          fi

      - name: Commit README coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "ci: update coverage badge [skip ci]"
          git push

      - name: PMD static analysis
        uses: pmd/pmd-github-action@v2
        id: pmd
        with:
          version: '7.17.0'
          rulesets: 'ruleset.xml'

      - name: Fail build if there are violations
        if: steps.pmd.outputs.violations != 0
        run: exit 1

      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: backend/target/pmd.xml

      - name: Package
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarthome-backend-jar
          path: backend/target/*.jar

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile (TypeScript check)
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npx ng lint

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Build (production)
        run: npx ng build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarthome-frontend-dist
          path: frontend/dist/
